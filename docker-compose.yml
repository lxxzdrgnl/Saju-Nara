services:

  # ── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: sajuguri
      POSTGRES_USER: rheon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /home/rheon/servers/postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rheon -d sajuguri"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://rheon:${POSTGRES_PASSWORD}@postgres:5432/sajuguri
      - CHROMA_PATH=/app/chroma_db
    volumes:
      - ./backend/chroma_db:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes: {}
