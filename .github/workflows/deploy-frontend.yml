name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PC_SSH_KEY }}" > ~/.ssh/pc_key
          chmod 600 ~/.ssh/pc_key
          ssh-keyscan -H ${{ secrets.PC_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/pc_key \
            ${{ secrets.PC_SSH_USER }}@${{ secrets.PC_SSH_HOST }} \
            "cd ~/servers/sajuguri/repo && \
             git pull && \
             cd ~/servers && \
             docker compose up -d --build --no-deps sajuguri-frontend && \
             echo '✅ Frontend deployed'"

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/pc_key
