name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PC_SSH_KEY }}" > ~/.ssh/pc_key
          chmod 600 ~/.ssh/pc_key
          ssh-keyscan -H ${{ secrets.PC_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/pc_key \
            ${{ secrets.PC_SSH_USER }}@${{ secrets.PC_SSH_HOST }} \
            "cd ~/servers/sajuguri/repo && \
             git fetch origin && git reset --hard origin/main && \
             echo 'NUXT_PUBLIC_API_BASE=${{ secrets.NUXT_PUBLIC_API_BASE }}' > ~/servers/sajuguri/repo/frontend/.env && \
             cd ~/servers && \
             docker compose up -d --build --no-deps sajuguri-frontend && \
             echo '⏳ Waiting for frontend...' && \
             sleep 5 && \
             docker compose logs --tail=20 sajuguri-frontend && \
             docker compose ps sajuguri-frontend | grep -q 'Up' && echo '✅ Frontend deployed' || (echo '❌ Frontend failed to start' && exit 1)"

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/pc_key
